{% load static %}

<section class="hero">

    <div class="container">

        <div class="row align-items-center">

            <!-- Left Content -->
            <div class="col-lg-5 hero-content">

                <span class="hero-badge">
                    DIGITAL CREATIVE AGENCY
                </span>

                <h1 class="hero-title">
                    Create.<br>
                    Capture.<br>
                    Convert.
                </h1>

                <p class="hero-subtitle">
                    Graphic Design • Photography • Videography • Web Development
                </p>

                <div class="hero-buttons">

                    <a href="#portfolio" class="btn-primary-custom">
                        View Our Work
                        <i class="bi bi-arrow-up-right"></i>
                    </a>

                    <a href="/contact/" class="btn-outline-custom">
                        Let's Talk
                    </a>

                </div>

            </div>

            <!-- Right Image -->

            <div class="col-lg-7">

                <div class="hero-image-wrapper">

                    <img
                        src="{% static 'images/hero/hi1.jpg' %}"
                        class="hero-image"
                        alt="Creative Agency">

                </div>

            </div>

        </div>

    </div>

</section>
