{% load static %}

<section class="project-hero">

    <div class="container">

        <a href="{% url 'projects' %}" class="back-link">
            ← Back to Portfolio
        </a>

        <div class="project-hero-content">

            <!-- LEFT -->

            <div class="project-text">

                <span class="section-tag">

                    Web Design & Development

                </span>

                <h1>

                    Pan African Society of
                    <span>Endometriosis</span>

                </h1>

                <p>

                    A healthcare platform built to improve awareness,
                    education and collaboration across Africa through
                    a modern, responsive digital experience.

                </p>

                <div class="hero-buttons">

                    <a href="https://pase.africa/"
                       target="_blank"
                       class="btn-primary">

                        Visit Website

                    </a>

                    <a href="#gallery"
                       class="btn-secondary">

                        View Gallery

                    </a>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="project-preview">

                <div class="browser-frame">

                    <div class="browser-top">

                        <div class="browser-controls">

                            <span class="dot red"></span>

                            <span class="dot yellow"></span>

                            <span class="dot green"></span>

                        </div>

                        <div class="browser-address">

                            https://pase.africa

                        </div>

                    </div>

                    <img
                        src="{% static 'images/projects/pase/npase.jpg' %}"
                        alt="PASE Homepage">

                </div>

            </div>

        </div>

    </div>

</section>
