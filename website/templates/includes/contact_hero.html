{% load static %}

<section class="contact-hero">

    <div class="container">

        <div class="row align-items-center">

            <!-- Left Content -->

            <div class="col-lg-5">

                <span class="section-tag">
                    CONTACT
                </span>

                <h1>
                    Let's Talk.
                </h1>

                <p>
                    Tell us about your next project. Whether it's branding,
                    photography, videography or a modern website, we'd love
                    to hear from you.
                </p>

                <div class="availability">

                    <i class="bi bi-circle-fill"></i>

                    Available for New Projects

                </div>

            </div>

            <!-- Right Image -->

            <div class="col-lg-7">

                <div class="contact-hero-image">

                    <img src="{% static 'images/contact/image.png' %}"
                         alt="Line Eight Office">

                </div>

            </div>

        </div>

    </div>

</section>
