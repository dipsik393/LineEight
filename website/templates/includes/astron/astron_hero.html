{% load static %}

<section class="project-hero">

    <div class="container">

        <a href="{% url 'projects' %}" class="back-link">
            ← Back to Portfolio
        </a>

        <div class="project-hero-content">

            <!-- Left -->

            <div class="project-text">

                <span class="section-tag">

                    Web Design & Development

                </span>

                <h1>

                    Astron
                    <span>Digital Experience</span>

                </h1>

                <p>

                    A modern digital platform designed to deliver a clean,
                    engaging and responsive experience through innovative
                    design and development.

                </p>

                <div class="hero-buttons">

                    <a href="https://astronhealthcare.africa/"
                       target="_blank"
                       class="btn-primary">

                        Visit Website

                    </a>

                    <a href="#gallery"
                       class="btn-secondary">

                        View Gallery

                    </a>

                </div>

            </div>

            <!-- Right -->

            <div class="project-preview">

                <div class="browser-frame">

                    <div class="browser-top">

                        <div class="browser-controls">

                            <span class="dot red"></span>
                            <span class="dot yellow"></span>
                            <span class="dot green"></span>

                        </div>

                        <div class="browser-address">

                            https://astronhealthcare.africa/

                        </div>

                    </div>

                    <img src="{% static 'images/astron/AH.jpg' %}"
                         alt="Astron Homepage">

                </div>

            </div>

        </div>

    </div>

</section>
